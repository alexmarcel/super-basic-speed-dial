<html>
    <head>
        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="third-party/bootstrap-5.1.3-dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="style-newtab.css">
        <title>New Tab</title>
    </head>
    <body class="bg-dark text-white">
        <div class="container">
            <div  class="row mt-5 justify-content-center">
                <div class="col"><h1 class="display-4 text-center" id="title">Super Basic Speed Dial</h1></div>
            </div>
            <div id="shortcuts" class="row mt-5 justify-content-center">
            </div>
        </div>
        
        <!-- Modal -->
        <div class="modal fade" id="modalAddShortcut" tabindex="-1" aria-labelledby="modalAddShortcutLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-dark">
                    <div class="modal-header modal-dark-header">
                        <h6 class="modal-title text-white" id="modalAddShortcutLabel">Add Shortcut</h6>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body modal-dark-body">
                        <form autocomplete="off">
                            <div class="mb-3">
                                <label for="modalSiteName" class="form-label modal-label">Site Name</label>
                                <input type="text" class="form-control modal-input" id="modalSiteName" placeholder="e.g. GitHub">
                            </div>
                            <div class="mb-1">
                                <label for="modalURL" class="form-label modal-label">URL</label>
                                <input type="text" class="form-control modal-input" id="modalURL" placeholder="https://...">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer modal-dark-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary btn-sm" id="btnAddShortcut">Add Shortcut</button>
                    </div>
                </div>
            </div>
        </div>


        <!-- Option 1: Bootstrap Bundle with Popper -->
        <script src="third-party/bootstrap-5.1.3-dist/js/bootstrap.bundle.min.js"></script>
        <script src="newtab.js"></script>
    </body>
</html>
